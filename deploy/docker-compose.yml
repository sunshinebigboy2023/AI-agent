services:
  searxng:
    image: searxng/searxng:latest
    container_name: office-ai-agent-searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_BASE_URL:-http://localhost:8080/}
    volumes:
      - ./searxng:/etc/searxng
    ports:
      - "${SEARXNG_PORT:-8080}:8080"

  backend:
    image: office-ai-agent-backend:latest
    build:
      context: ../ai-agent
    container_name: office-ai-agent-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      SPRING_AI_DASHSCOPE_CHAT_OPTIONS_MODEL: ${SPRING_AI_DASHSCOPE_CHAT_OPTIONS_MODEL:-qwen-plus}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080}
      SEARXNG_TOP_K: ${SEARXNG_TOP_K:-5}
      ALIYUN_OPENSEARCH_HOST: ${ALIYUN_OPENSEARCH_HOST:-}
      ALIYUN_OPENSEARCH_API_KEY: ${ALIYUN_OPENSEARCH_API_KEY:-}
      ALIYUN_OPENSEARCH_WORKSPACE: ${ALIYUN_OPENSEARCH_WORKSPACE:-default}
      ALIYUN_OPENSEARCH_SERVICE_ID: ${ALIYUN_OPENSEARCH_SERVICE_ID:-ops-web-search-001}
      ALIYUN_OPENSEARCH_TOP_K: ${ALIYUN_OPENSEARCH_TOP_K:-5}
      ALIYUN_OPENSEARCH_CONTENT_TYPE: ${ALIYUN_OPENSEARCH_CONTENT_TYPE:-snippet}
      OFFICE_KNOWLEDGE_DIR: /app/tmp/knowledge
      OFFICE_ALLOWED_ORIGINS: ${OFFICE_ALLOWED_ORIGINS:-*}
      OFFICE_ENABLE_TERMINAL_TOOL: ${OFFICE_ENABLE_TERMINAL_TOOL:-false}
      OFFICE_AGENT_MAX_STEPS: ${OFFICE_AGENT_MAX_STEPS:-20}
      OFFICE_AGENT_MAX_OBSERVATION_LENGTH: ${OFFICE_AGENT_MAX_OBSERVATION_LENGTH:-4000}
      OFFICE_CHAT_MAX_MESSAGE_LENGTH: ${OFFICE_CHAT_MAX_MESSAGE_LENGTH:-8000}
      OFFICE_KNOWLEDGE_MAX_UPLOAD_BYTES: ${OFFICE_KNOWLEDGE_MAX_UPLOAD_BYTES:-10485760}
      OFFICE_KNOWLEDGE_CHUNK_SIZE: ${OFFICE_KNOWLEDGE_CHUNK_SIZE:-1000}
      OFFICE_KNOWLEDGE_CHUNK_OVERLAP: ${OFFICE_KNOWLEDGE_CHUNK_OVERLAP:-150}
      OFFICE_KNOWLEDGE_REBUILD_ON_STARTUP: ${OFFICE_KNOWLEDGE_REBUILD_ON_STARTUP:-true}
      OFFICE_TOOLS_WORKSPACE_DIR: ${OFFICE_TOOLS_WORKSPACE_DIR:-/app/tmp/workspace}
      OFFICE_DOWNLOAD_MAX_BYTES: ${OFFICE_DOWNLOAD_MAX_BYTES:-10485760}
      OFFICE_WEB_SCRAPING_TIMEOUT_MS: ${OFFICE_WEB_SCRAPING_TIMEOUT_MS:-10000}
      OFFICE_WEB_SCRAPING_MAX_BODY_SIZE: ${OFFICE_WEB_SCRAPING_MAX_BODY_SIZE:-200000}
    volumes:
      - ../ai-agent/tmp/knowledge:/app/tmp/knowledge
      - ../ai-agent/tmp/workspace:/app/tmp/workspace
    depends_on:
      - searxng

  frontend:
    image: office-ai-agent-frontend:latest
    build:
      context: ../ai-agent/office-ai-assistant-frontend
    container_name: office-ai-agent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5021}:80"
    depends_on:
      - backend
