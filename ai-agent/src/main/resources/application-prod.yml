server:
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      max-file-size: ${OFFICE_MAX_FILE_SIZE:10MB}
      max-request-size: ${OFFICE_MAX_REQUEST_SIZE:10MB}

springdoc:
  swagger-ui:
    enabled: ${OFFICE_ENABLE_API_DOCS:false}
  api-docs:
    enabled: ${OFFICE_ENABLE_API_DOCS:false}

knife4j:
  enable: ${OFFICE_ENABLE_API_DOCS:false}

office:
  web:
    allowed-origin-patterns: ${OFFICE_ALLOWED_ORIGINS:*}
  agent:
    enable-terminal-tool: ${OFFICE_ENABLE_TERMINAL_TOOL:false}
  knowledge:
    storage-dir: ${OFFICE_KNOWLEDGE_DIR:/app/tmp/knowledge}
    max-upload-bytes: ${OFFICE_KNOWLEDGE_MAX_UPLOAD_BYTES:10485760}

logging:
  level:
    root: INFO
    org.springframework.ai: INFO
