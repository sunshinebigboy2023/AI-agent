server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
aliyun:
  opensearch:
    host: ${ALIYUN_OPENSEARCH_HOST:}
    workspace: ${ALIYUN_OPENSEARCH_WORKSPACE:default}
    service-id: ${ALIYUN_OPENSEARCH_SERVICE_ID:ops-web-search-001}
    api-key: ${ALIYUN_OPENSEARCH_API_KEY:}
    top-k: ${ALIYUN_OPENSEARCH_TOP_K:5}
    content-type: ${ALIYUN_OPENSEARCH_CONTENT_TYPE:snippet}
searxng:
  base-url: ${SEARXNG_BASE_URL:}
  top-k: ${SEARXNG_TOP_K:5}
office:
  chat:
    max-message-length: ${OFFICE_CHAT_MAX_MESSAGE_LENGTH:8000}
  web:
    allowed-origin-patterns: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
  agent:
    enable-terminal-tool: ${OFFICE_ENABLE_TERMINAL_TOOL:false}
    max-steps: ${OFFICE_AGENT_MAX_STEPS:20}
    max-observation-length: ${OFFICE_AGENT_MAX_OBSERVATION_LENGTH:4000}
  knowledge:
    storage-dir: ${OFFICE_KNOWLEDGE_DIR:${user.dir}/tmp/knowledge}
    max-upload-bytes: ${OFFICE_KNOWLEDGE_MAX_UPLOAD_BYTES:10485760}
    chunk-size: ${OFFICE_KNOWLEDGE_CHUNK_SIZE:1000}
    chunk-overlap: ${OFFICE_KNOWLEDGE_CHUNK_OVERLAP:150}
    rebuild-on-startup: ${OFFICE_KNOWLEDGE_REBUILD_ON_STARTUP:true}
  tools:
    workspace-dir: ${OFFICE_TOOLS_WORKSPACE_DIR:${user.dir}/tmp/workspace}
    download:
      max-bytes: ${OFFICE_DOWNLOAD_MAX_BYTES:10485760}
    web-scraping:
      timeout-ms: ${OFFICE_WEB_SCRAPING_TIMEOUT_MS:10000}
      max-body-size: ${OFFICE_WEB_SCRAPING_MAX_BODY_SIZE:200000}
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG
